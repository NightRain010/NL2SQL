# 生产部署：前端 + 后端，密钥通过 .env 注入，不写入镜像
# 用法：在服务器上配置 .env 后执行
#   docker compose -f docker-compose.prod.yml up -d
# 若需连同 MySQL 一起部署，可加上：docker compose -f docker-compose.prod.yml -f docker/docker-compose.yml up -d

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: nl2sql-backend:latest
    container_name: nl2sql-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # 若与 MySQL 同 compose 部署，用服务名
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
    expose:
      - "8000"
    # 若 MySQL 在本 compose 中，取消下一行注释
    # depends_on:
    #   mysql:
    #     condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: nl2sql-frontend:latest
    container_name: nl2sql-frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:10080:80"
    depends_on:
      - backend

  # 可选：若服务器上未单独部署 MySQL，可启用下方 mysql 服务
